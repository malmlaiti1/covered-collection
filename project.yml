name: CoveredCollection
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: minimal
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  CoveredCollection:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CoveredCollection
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.coveredcollection.CoveredCollection
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: "The Covered Collection"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES

  CoveredCollectionTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CoveredCollectionTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: CoveredCollection
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.coveredcollection.CoveredCollectionTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CoveredCollection.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/CoveredCollection"

schemes:
  CoveredCollection:
    build:
      targets:
        CoveredCollection: all
        CoveredCollectionTests: [test]
    test:
      targets:
        - CoveredCollectionTests
      gatherCoverageData: true
      coverageTargets:
        - CoveredCollection
